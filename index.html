<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrierung - Virtuelles Labor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="login-container">
    <h2>Account erstellen</h2>
    <p>Bitte registriere dich mit deiner Matrikelnummer für das virtuelle Labor.</p>
    
    <input type="text" id="regUserId" placeholder="Matrikelnummer" />
    <input type="password" id="regPassword" placeholder="Passwort wählen" />
    <input type="text" id="hp-website" name="website" tabindex="-1" autocomplete="off" placeholder="Website" class="hp-field" />
    
    <button id="registerBtn">Registrieren</button>
    
    <p id="statusMessage" class="hidden"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
